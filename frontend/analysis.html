<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Deepfake Detection System - Upload</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060b14;
            --panel: rgba(255, 255, 255, 0.045);
            --panel-border: rgba(34, 211, 238, 0.22);
            --text: #ffffff;
            --muted: rgba(207, 222, 255, 0.72);
            --accent: #22d3ee;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: Inter, sans-serif; }
        body {
            background:
                radial-gradient(circle at top left, rgba(34, 211, 238, 0.14), transparent 26%),
                radial-gradient(circle at top right, rgba(14, 165, 233, 0.11), transparent 22%),
                linear-gradient(180deg, #07101d, #04070d);
        }
        .shell { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
        .card {
            width: min(960px, 100%);
            border: 1px solid var(--panel-border);
            background: var(--panel);
            backdrop-filter: blur(18px);
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5);
        }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .brand-badge {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #112238, #08111d);
            border: 1px solid rgba(34, 211, 238, 0.35);
            display: grid; place-items: center; color: var(--accent); font-weight: 800;
        }
        h1 { margin: 0 0 10px; font-family: 'Space Grotesk', sans-serif; font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1; }
        p { color: var(--muted); margin: 0; line-height: 1.6; }
        .grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 20px; margin-top: 24px; }
        .upload, .preview {
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.28);
            padding: 22px;
            min-height: 360px;
        }
        .upload {
            display: grid;
            place-items: center;
            text-align: center;
            border-style: dashed;
            cursor: pointer;
            transition: transform .2s ease, border-color .2s ease;
        }
        .upload.drag { border-color: var(--accent); transform: translateY(-2px); }
        .upload strong { display: block; font-size: 1.2rem; margin-top: 14px; }
        .upload small { display: block; margin-top: 8px; color: rgba(255, 255, 255, 0.5); }
        .btn {
            margin-top: 18px;
            appearance: none;
            border: 0;
            border-radius: 999px;
            padding: 14px 22px;
            background: var(--accent);
            color: #000;
            font-weight: 800;
            cursor: pointer;
        }
        .btn:disabled { opacity: .6; cursor: not-allowed; }
        .preview { display: flex; flex-direction: column; gap: 16px; }
        .preview-box {
            flex: 1;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: grid;
            place-items: center;
            overflow: hidden;
            min-height: 250px;
        }
        .preview-box img, .preview-box video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #000;
        }
        .status { min-height: 24px; color: var(--muted); font-size: .95rem; }
        .process-feed {
            margin-top: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.35);
            padding: 12px;
            max-height: 180px;
            overflow: auto;
        }
        .process-feed h4 {
            margin: 0 0 8px;
            font-size: 0.9rem;
            color: var(--accent);
            font-family: 'Space Grotesk', sans-serif;
        }
        .process-feed ul {
            margin: 0;
            padding-left: 18px;
            color: var(--muted);
            line-height: 1.55;
            font-size: 0.85rem;
        }
        .process-feed li.active {
            color: #fff;
        }
        input[type=file] { display: none; }
        @media (max-width: 840px) {
            .grid { grid-template-columns: 1fr; }
            .upload, .preview { min-height: auto; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="card">
            <div class="brand">
                <div class="brand-badge">DG</div>
                <div>
                    <div style="font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--accent);">Deepfake Detection System</div>
                    <p>Upload image or video first, then review the result.</p>
                </div>
            </div>
            <h1>Upload media for analysis</h1>
            <p>Select a video or image. The result page opens after the backend finishes processing.</p>

            <div class="grid">
                <label class="upload" id="dropZone" for="fileInput">
                    <div>
                        <div style="font-size: 3rem; color: var(--accent);">â¬†</div>
                        <strong>Drop a file here</strong>
                        <small>or click to browse. Supported: JPG, PNG, WEBP, MP4, AVI, MOV, WEBM</small>
                        <small id="selectedName">No file selected</small>
                    </div>
                </label>

                <div class="preview">
                    <div class="preview-box" id="previewBox">
                        <div style="text-align:center; padding: 20px; color: rgba(255,255,255,0.45);">
                            Preview will appear here
                        </div>
                    </div>
                    <div class="status" id="statusText">Ready.</div>
                    <div class="process-feed" id="processFeed" style="display:none;">
                        <h4>Live Backend Steps</h4>
                        <ul id="processSteps"></ul>
                    </div>
                    <button class="btn" id="analyzeBtn" disabled>Start Analysis</button>
                </div>
            </div>
        </section>
    </main>

    <input type="file" id="fileInput" accept="image/*,video/*">

    <script>
        const apiBase = window.location.origin;
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewBox = document.getElementById('previewBox');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const statusText = document.getElementById('statusText');
        const selectedName = document.getElementById('selectedName');
        const processFeed = document.getElementById('processFeed');
        const processSteps = document.getElementById('processSteps');
        let selectedFile = null;
        let processPoll = null;

        const appendProcessStep = (text, active = true) => {
            const li = document.createElement('li');
            li.textContent = text;
            if (active) li.classList.add('active');
            processSteps.appendChild(li);
            processFeed.scrollTop = processFeed.scrollHeight;
        };

        const startProcessPolling = (processId) => {
            processFeed.style.display = 'block';
            processSteps.innerHTML = '';
            appendProcessStep('Process initialized...');

            processPoll = setInterval(async () => {
                try {
                    const res = await fetch(`${apiBase}/api/process/${processId}`);
                    if (!res.ok) return;
                    const data = await res.json();
                    processSteps.innerHTML = '';
                    (data.steps || []).forEach((step) => {
                        const progressText = typeof step.progress === 'number' ? ` (${step.progress}%)` : '';
                        appendProcessStep(`${step.message}${progressText}`, true);
                    });

                    if (data.status === 'completed' || data.status === 'failed') {
                        clearInterval(processPoll);
                        processPoll = null;
                    }
                } catch (e) {
                    console.warn('Process polling failed', e);
                }
            }, 500);
        };

        const showPreview = (file) => {
            previewBox.innerHTML = '';
            const url = URL.createObjectURL(file);
            if (file.type.startsWith('video/')) {
                const video = document.createElement('video');
                video.src = url;
                video.controls = true;
                video.playsInline = true;
                previewBox.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = url;
                img.alt = 'Selected file preview';
                previewBox.appendChild(img);
            }
        };

        const selectFile = (file) => {
            if (!file) return;
            selectedFile = file;
            selectedName.textContent = file.name;
            showPreview(file);
            analyzeBtn.disabled = false;
            statusText.textContent = 'File ready. Start analysis when you are ready.';
        };

        fileInput.addEventListener('change', () => selectFile(fileInput.files[0]));

        ['dragenter', 'dragover'].forEach((eventName) => {
            dropZone.addEventListener(eventName, (event) => {
                event.preventDefault();
                dropZone.classList.add('drag');
            });
        });

        ['dragleave', 'drop'].forEach((eventName) => {
            dropZone.addEventListener(eventName, (event) => {
                event.preventDefault();
                dropZone.classList.remove('drag');
            });
        });

        dropZone.addEventListener('drop', (event) => {
            const file = event.dataTransfer.files[0];
            if (file) selectFile(file);
        });

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            analyzeBtn.disabled = true;
            statusText.textContent = 'Uploading and analyzing...';

            try {
                const processId = (crypto && crypto.randomUUID) ? crypto.randomUUID() : `proc_${Date.now()}_${Math.random().toString(16).slice(2)}`;
                startProcessPolling(processId);

                const formData = new FormData();
                formData.append('file', selectedFile);

                const endpoint = selectedFile.type.startsWith('video/') ? '/api/predict_video' : '/api/predict';
                const response = await fetch(`${apiBase}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'X-Session-ID': localStorage.getItem('deepfake_detection_system_session_id') || '',
                        'X-Process-ID': processId
                    },
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(await response.text());
                }

                const result = await response.json();
                localStorage.setItem('video_analysis_result', JSON.stringify(result));
                if (processPoll) {
                    clearInterval(processPoll);
                    processPoll = null;
                }
                window.location.href = '/video_result.html';
            } catch (error) {
                console.error(error);
                statusText.textContent = 'Analysis failed. Please try again.';
                analyzeBtn.disabled = false;
                if (processPoll) {
                    clearInterval(processPoll);
                    processPoll = null;
                }
                appendProcessStep('Analysis failed before completion.');
            }
        });
    </script>
</body>
</html>
